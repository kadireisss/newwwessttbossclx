# ==============================================
# BOSS Cloaker v3.2 - Nginx + Passenger Config
# ==============================================
# 
# PLESK KURULUMU:
# 1. Plesk Panel > Websites & Domains > [domain] > Apache & nginx Settings
# 2. "Additional nginx directives" bölümüne aşağıdaki ayarları yapıştır
# 3. Veya bu dosyayı /etc/nginx/conf.d/ altına kopyala
#
# MANUEL KURULUM:
# Bu dosyayı /etc/nginx/sites-available/boss-cloaker.conf olarak kaydet
# ln -s /etc/nginx/sites-available/boss-cloaker.conf /etc/nginx/sites-enabled/
# nginx -t && systemctl reload nginx

# ================================================
# OPTION A: Tam server block (Manuel kurulum)
# ================================================
server {
    listen 80;
    server_name yourdomain.com;  # <-- DOMAIN ADINI DEĞİŞTİR

    # Uygulama root dizini - Passenger static dosyaları buradan sunar
    root /var/www/boss-cloaker/public;

    # --- Passenger Ayarları ---
    passenger_enabled on;
    passenger_app_type node;
    passenger_startup_file app.cjs;
    passenger_app_root /var/www/boss-cloaker;

    # Node.js yolu (sunucudaki gerçek yolu kontrol et: which node)
    passenger_nodejs /usr/bin/node;

    # Environment
    passenger_app_env production;

    # Hata ayıklama için friendly error pages AÇ (debug bitince kapat)
    passenger_friendly_error_pages on;

    # Startup timeout - ilk başlatmada DB bağlantısı zaman alabilir
    passenger_start_timeout 90;

    # WebSocket desteği için sticky sessions
    passenger_sticky_sessions on;

    # Uygulama havuzu ayarları
    passenger_min_instances 1;
    passenger_max_pool_size 2;

    # Request body limit (landing page HTML'leri büyük olabilir)
    client_max_body_size 10M;

    # Güvenlik başlıkları
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer" always;

    # Statik dosyalar için cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # WebSocket endpoint
    location /ws/ {
        passenger_app_group_name boss-cloaker-ws;
        passenger_force_max_concurrent_requests_per_process 0;
    }

    # Gzip sıkıştırma
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 1024;
    gzip_comp_level 6;

    # Access log
    access_log /var/log/nginx/boss-cloaker-access.log;
    error_log /var/log/nginx/boss-cloaker-error.log;
}


# ================================================
# OPTION B: Plesk "Additional nginx directives"
# ================================================
